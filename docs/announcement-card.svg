<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#FFFDF8"/>
  <rect width="1080" height="470" fill="#FDF4E3"/>

  <!-- logo lockup -->
  <g transform="translate(326,70) scale(2.2)">
    <g stroke="#F2A516" stroke-width="5" stroke-linecap="round">
      <line x1="38" y1="26" x2="38" y2="16"/>
      <line x1="38" y1="26" x2="38" y2="16" transform="rotate(33 38 56)"/>
      <line x1="38" y1="26" x2="38" y2="16" transform="rotate(-33 38 56)"/>
      <line x1="38" y1="26" x2="38" y2="16" transform="rotate(66 38 56)"/>
      <line x1="38" y1="26" x2="38" y2="16" transform="rotate(-66 38 56)"/>
    </g>
    <path d="M14 56 A24 24 0 0 1 62 56 Z" fill="#F2A516"/>
    <path d="M28 56 A10 10 0 0 1 48 56 Z" fill="#FFF3D6"/>
    <text x="78" y="54" font-size="46" font-weight="700" fill="#E0701A">bask</text>
  </g>

  <text x="540" y="300" text-anchor="middle" font-size="22" font-weight="800"
        letter-spacing="3" fill="#E0701A">FREE · OPEN-SOURCE · FOR REPTILE KEEPERS</text>

  <text x="540" y="372" text-anchor="middle" font-size="66" font-weight="800" fill="#22262e">Your animal room,</text>
  <text x="540" y="446" text-anchor="middle" font-size="66" font-weight="800" fill="#E0701A">at a glance.</text>

  <text x="540" y="520" text-anchor="middle" font-size="30" fill="#5c6675">Green means good — now easier than ever to set up.</text>

  <!-- dashboard mockup -->
  <rect x="80" y="566" width="920" height="290" rx="22" fill="#161b24"/>
  <g>
    <g stroke="#F2A516" stroke-width="2.4" stroke-linecap="round" transform="translate(112,592)">
      <line x1="14" y1="9" x2="14" y2="3"/>
      <line x1="14" y1="9" x2="14" y2="3" transform="rotate(40 14 22)"/>
      <line x1="14" y1="9" x2="14" y2="3" transform="rotate(-40 14 22)"/>
    </g>
    <path d="M118 614 A12 12 0 0 1 142 614 Z" fill="#F2A516" transform="translate(0,0)"/>
    <text x="150" y="618" font-size="26" font-weight="800" fill="#E0701A">bask</text>
    <text x="888" y="618" text-anchor="end" font-size="20" fill="#7ee3a6">● 3 OK&#160;&#160;&#160;● 1 check</text>
  </g>

  <!-- tiles -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <!-- Telemachus OK -->
    <rect x="112" y="648" width="195" height="178" rx="14" fill="#14241a" stroke="#2e9e5b" stroke-width="1.5"/>
    <text x="132" y="690" font-size="22" font-weight="800" fill="#f3f5f8">Telemachus</text>
    <text x="132" y="716" font-size="15" fill="#9aa4b2">Ball Python</text>
    <text x="132" y="788" font-size="44" font-weight="800" fill="#5fd089">88°</text>
    <text x="287" y="690" text-anchor="end" font-size="16" font-weight="700" fill="#5fd089">OK</text>

    <!-- Dracarys OK -->
    <rect x="320" y="648" width="195" height="178" rx="14" fill="#14241a" stroke="#2e9e5b" stroke-width="1.5"/>
    <text x="340" y="690" font-size="22" font-weight="800" fill="#f3f5f8">Dracarys</text>
    <text x="340" y="716" font-size="15" fill="#9aa4b2">Bearded Dragon</text>
    <text x="340" y="788" font-size="44" font-weight="800" fill="#5fd089">102°</text>
    <text x="495" y="690" text-anchor="end" font-size="16" font-weight="700" fill="#5fd089">OK</text>

    <!-- Pascal OK -->
    <rect x="528" y="648" width="195" height="178" rx="14" fill="#14241a" stroke="#2e9e5b" stroke-width="1.5"/>
    <text x="548" y="690" font-size="22" font-weight="800" fill="#f3f5f8">Pascal</text>
    <text x="548" y="716" font-size="15" fill="#9aa4b2">Veiled Chameleon</text>
    <text x="548" y="788" font-size="44" font-weight="800" fill="#5fd089">86°</text>
    <text x="703" y="690" text-anchor="end" font-size="16" font-weight="700" fill="#5fd089">OK</text>

    <!-- Wasabi CHECK -->
    <rect x="736" y="648" width="195" height="178" rx="14" fill="#2a2410" stroke="#F2A516" stroke-width="1.5"/>
    <text x="756" y="690" font-size="22" font-weight="800" fill="#f3f5f8">Wasabi</text>
    <text x="756" y="716" font-size="15" fill="#9aa4b2">Panther Chameleon</text>
    <text x="756" y="788" font-size="44" font-weight="800" fill="#e0533d">38%</text>
    <text x="911" y="690" text-anchor="end" font-size="16" font-weight="700" fill="#F2A516">Check</text>
  </g>

  <!-- feature checklist -->
  <g>
    <g transform="translate(0,0)">
      <circle cx="168" cy="934" r="17" fill="#F2A516"/>
      <path d="M160 934 l6 6 l11 -13" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="202" y="943" font-size="29" font-weight="600" fill="#22262e">Live Herpstat thermostat monitoring</text>
    </g>
    <g>
      <circle cx="168" cy="996" r="17" fill="#F2A516"/>
      <path d="M160 996 l6 6 l11 -13" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="202" y="1005" font-size="29" font-weight="600" fill="#22262e">Runs on any Raspberry Pi</text>
    </g>
    <g>
      <circle cx="168" cy="1058" r="17" fill="#F2A516"/>
      <path d="M160 1058 l6 6 l11 -13" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="202" y="1067" font-size="29" font-weight="600" fill="#22262e">One-flash image — no terminal, no code</text>
    </g>
    <g>
      <circle cx="168" cy="1120" r="17" fill="#F2A516"/>
      <path d="M160 1120 l6 6 l11 -13" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="202" y="1129" font-size="29" font-weight="600" fill="#22262e">No cloud · no account · always free</text>
    </g>
  </g>

  <!-- footer -->
  <rect x="290" y="1210" width="500" height="64" rx="32" fill="#F2A516"/>
  <text x="540" y="1251" text-anchor="middle" font-size="27" font-weight="800" fill="#3a2a05">jlyfshhh.github.io/bask</text>
  <text x="540" y="1316" text-anchor="middle" font-size="22" fill="#5c6675">Follow the builds  ·  @thebioactivekeeper</text>
</svg>
