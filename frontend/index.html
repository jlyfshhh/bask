<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bask</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Installable app (Add to Home Screen) -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0d0f15">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bask">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ── Top bar: title, at-a-glance status counts, manage button ── -->
  <header id="topbar">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 196 70" role="img" aria-label="Bask">
        <g stroke="#F2A516" stroke-width="5" stroke-linecap="round">
          <line x1="38" y1="26" x2="38" y2="16"/>
          <line x1="38" y1="26" x2="38" y2="16" transform="rotate(33 38 56)"/>
          <line x1="38" y1="26" x2="38" y2="16" transform="rotate(-33 38 56)"/>
          <line x1="38" y1="26" x2="38" y2="16" transform="rotate(66 38 56)"/>
          <line x1="38" y1="26" x2="38" y2="16" transform="rotate(-66 38 56)"/>
        </g>
        <path d="M14 56 A24 24 0 0 1 62 56 Z" fill="#F2A516"/>
        <path d="M28 56 A10 10 0 0 1 48 56 Z" fill="#FFF3D6"/>
        <text x="78" y="54" font-size="46" font-weight="700" fill="#e0701a"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">bask</text>
      </svg>
      <span id="clock"></span>
    </div>
    <div id="summary" class="summary"></div>
    <div id="period" class="period-badge"></div>
    <button class="manage-btn" onclick="openManage()" aria-label="Manage">
      <span class="gear">⚙</span><span class="manage-label">Manage</span>
    </button>
  </header>

  <!-- Big at-a-glance room status — readable from across the room -->
  <div id="status-banner" class="status-banner"></div>

  <!-- Compact Herpstat thermostat strip (hidden unless units are configured) -->
  <div id="thermostat-strip" class="tstat-strip"></div>

  <!-- ── Dashboard grid (fixed order, color-coded) ── -->
  <main id="grid"></main>
  <div id="updated" class="updated-stamp"></div>

  <!-- ── Per-enclosure detail sheet ── -->
  <div id="detail" class="sheet-overlay" onclick="if(event.target===this)closeDetail()">
    <div class="sheet" id="detail-sheet"></div>
  </div>

  <!-- ── Manage overlay (full screen, tabbed) ── -->
  <div id="manage" class="manage-overlay">
    <div class="manage-panel">
      <div class="manage-head">
        <div class="manage-tabs">
          <button class="mtab active" data-tab="enclosures" onclick="switchTab('enclosures')">Enclosures</button>
          <button class="mtab" data-tab="sensors" onclick="switchTab('sensors')">Sensors</button>
          <button class="mtab" data-tab="species" onclick="switchTab('species')">Species</button>
          <button class="mtab" data-tab="thermostats" onclick="switchTab('thermostats')">Thermostats</button>
          <button class="mtab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
        </div>
        <button class="close-btn" onclick="closeManage()" aria-label="Close">✕</button>
      </div>
      <div class="manage-body">
        <section class="pane active" id="pane-enclosures"></section>
        <section class="pane" id="pane-sensors"></section>
        <section class="pane" id="pane-species"></section>
        <section class="pane" id="pane-thermostats"></section>
        <section class="pane" id="pane-settings"></section>
      </div>
    </div>
  </div>

  <!-- Generic editor sheet reused by enclosure/sensor/species forms -->
  <div id="editor" class="sheet-overlay" onclick="if(event.target===this)closeEditor()">
    <div class="sheet" id="editor-sheet"></div>
  </div>

  <!-- ── Pair-by-proximity wizard (full screen) ── -->
  <div id="pair" class="manage-overlay">
    <div class="manage-panel pair-panel">
      <div class="manage-head">
        <h2 class="pair-title">Pair sensors</h2>
        <button class="close-btn" onclick="closePair()" aria-label="Close">✕</button>
      </div>
      <div class="manage-body pair-body">
        <div id="pair-nearest" class="pair-nearest"></div>
        <div id="pair-targets" class="pair-targets"></div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
  <!-- Keeps Amazon Echo Show's Silk browser from timing out to the home screen.
       Only activates on Silk's user-agent (no effect on laptop/phone). -->
  <script src="keep.js"></script>
</body>
</html>
